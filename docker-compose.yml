version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: study_assistant_postgres
    restart: always
    environment:
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_secure_pass
      POSTGRES_DB: study_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/code/data
    environment:
      - DATABASE_URL=postgresql://study_user:study_secure_pass@db:5432/study_assistant
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
  backend-data:
